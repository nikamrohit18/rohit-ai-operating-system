version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rohit_ai_os
      POSTGRES_USER: rohit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rohit -d rohit_ai_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://rohit:${DB_PASSWORD}@postgres:5432/rohit_ai_os
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - fastembed_cache:/root/.cache/fastembed
    labels:
      - traefik.enable=true
      - traefik.http.routers.rohit-api.rule=Host(`api.rohitnikam.tech`)
      - traefik.http.routers.rohit-api.tls=true
      - traefik.http.routers.rohit-api.entrypoints=web,websecure
      - traefik.http.routers.rohit-api.tls.certresolver=mytlschallenge
      - traefik.http.services.rohit-api.loadbalancer.server.port=8000
    networks:
      - default
      - n8n_default

networks:
  n8n_default:
    external: true

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  fastembed_cache:
